name: Build

on:
  push:
    branches:
      - "**"
    tags:
      - "**"
  pull_request:

permissions:
  contents: read

env:
  APP_NAME: "Aula F75 Max Driver"
  RELEASE_BASE_NAME: "AulaF75MaxDriver"

jobs:
  macos-dmg:
    name: macOS DMG
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build macOS DMG
        run: make macos-dmg

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: aula-f75-max-driver-macos-dmg
          path: "build/Aula F75 Max Driver.dmg"
          if-no-files-found: error

  linux-build:
    name: Linux GTK
    runs-on: ubuntu-latest
    container:
      image: swift:6.0-noble

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          apt-get update
          apt-get install -y make libgtk-4-dev libhidapi-dev pkg-config python3-pil

      - name: Build Linux app
        run: make linux-build

      - name: Build Linux DEB installer
        shell: bash
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            make linux-deb RELEASE_TAG="${GITHUB_REF_NAME}" LINUX_DEB="build/aula-f75-max-driver-${GITHUB_SHA}.deb"
          else
            make linux-deb RELEASE_TAG="0.0.0+${GITHUB_SHA}" LINUX_DEB="build/aula-f75-max-driver-${GITHUB_SHA}.deb"
          fi

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: aula-f75-max-driver-linux
          path: "build/aula-f75-max-driver-${{ github.sha }}.deb"
          if-no-files-found: error

  android-build:
    name: Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Test Android app
        run: make android-test

      - name: Build Android debug APK
        run: make android-build

      - name: Upload Android debug artifact
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: aula-f75-max-driver-android-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Build Android release APK
        if: startsWith(github.ref, 'refs/tags/')
        run: bash android/gradlew assembleRelease

      - name: Upload Android release artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: aula-f75-max-driver-android-apk
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - macos-dmg
      - linux-build
      - android-build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: aula-f75-max-driver-macos-dmg
          path: release

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: aula-f75-max-driver-linux
          path: release

      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: aula-f75-max-driver-android-apk
          path: release

      - name: Prepare release assets
        run: make release-package RELEASE_DIR=release RELEASE_TAG="$GITHUB_REF_NAME" SOURCE_MACOS_DMG="${APP_NAME}.dmg" SOURCE_ANDROID_APK="app-release-unsigned.apk" SOURCE_LINUX_DEB="aula-f75-max-driver-${GITHUB_SHA}.deb"

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          safe_tag="${GITHUB_REF_NAME//\//-}"
          release_version="v${safe_tag#v}"
          is_rc_tag=false
          release_flags=()

          if [[ "${GITHUB_REF_NAME}" =~ (^|.*/)v?[0-9]+\.[0-9]+\.[0-9]+-rc[0-9]+$ ]]; then
            is_rc_tag=true
            release_flags+=(--prerelease --latest=false)
          fi

          assets=(
            "release/${RELEASE_BASE_NAME}-${release_version}.dmg"
            "release/${RELEASE_BASE_NAME}-${release_version}.apk"
            release/${RELEASE_BASE_NAME}-${release_version}_*.deb
          )

          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            if $is_rc_tag; then
              release_id="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${GITHUB_REF_NAME}" --jq '.id')"
              gh api -X PATCH "repos/${GITHUB_REPOSITORY}/releases/${release_id}" \
                -f prerelease=true \
                -f make_latest=false >/dev/null
            fi
            gh release upload "${GITHUB_REF_NAME}" "${assets[@]}" --clobber
          else
            gh release create "${GITHUB_REF_NAME}" "${assets[@]}" "${release_flags[@]}" \
              --title "${GITHUB_REF_NAME}" \
              --generate-notes
          fi
