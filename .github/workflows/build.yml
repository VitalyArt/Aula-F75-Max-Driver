name: Build

on:
  push:
    branches:
      - "**"
    tags:
      - "**"
  pull_request:

permissions:
  contents: read

env:
  APP_NAME: "Aula F75 Max Driver"
  RELEASE_BASE_NAME: "AulaF75MaxDriver"

jobs:
  macos-dmg:
    name: macOS DMG
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build macOS DMG
        run: make macos-dmg

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: aula-f75-max-driver-macos-dmg
          path: "build/Aula F75 Max Driver.dmg"
          if-no-files-found: error

  linux-build:
    name: Linux GTK
    runs-on: ubuntu-latest
    container:
      image: swift:6.0-noble

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          apt-get update
          apt-get install -y make libgtk-4-dev libhidapi-dev pkg-config python3-pil

      - name: Build Linux app
        run: make linux-build

      - name: Build Linux DEB installer
        shell: bash
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            make linux-deb RELEASE_TAG="${GITHUB_REF_NAME}" LINUX_DEB="build/aula-f75-max-driver-${GITHUB_SHA}.deb"
          else
            make linux-deb RELEASE_TAG="0.0.0+${GITHUB_SHA}" LINUX_DEB="build/aula-f75-max-driver-${GITHUB_SHA}.deb"
          fi

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: aula-f75-max-driver-linux
          path: "build/aula-f75-max-driver-${{ github.sha }}.deb"
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - macos-dmg
      - linux-build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: aula-f75-max-driver-macos-dmg
          path: release

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: aula-f75-max-driver-linux
          path: release

      - name: Prepare release assets
        run: make release-package RELEASE_DIR=release RELEASE_TAG="$GITHUB_REF_NAME" SOURCE_MACOS_DMG="${APP_NAME}.dmg" SOURCE_LINUX_DEB="aula-f75-max-driver-${GITHUB_SHA}.deb"

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          safe_tag="${GITHUB_REF_NAME//\//-}"
          release_version="v${safe_tag#v}"
          assets=(
            "release/${RELEASE_BASE_NAME}-${release_version}.dmg"
            release/${RELEASE_BASE_NAME}-${release_version}_*.deb
          )

          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" "${assets[@]}" --clobber
          else
            gh release create "${GITHUB_REF_NAME}" "${assets[@]}" \
              --title "${GITHUB_REF_NAME}" \
              --generate-notes
          fi
